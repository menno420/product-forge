# android-ci — build + unit-test the phone-controller Android side.
#
# ============================== PROVENANCE ==============================
# Why added : Slice 2 of products/phone-controller/ added an Android module
#             (products/phone-controller/android/) whose load-bearing piece
#             is a pure-JVM Kotlin port of the Slice-1 verdict engine. This
#             lane compiles + unit-tests that port so the decision model is
#             proven green in CI, with NO Android SDK download (the port is
#             SDK-free by design — see the module README's decide-and-flag).
# Scope     : builds ONLY the pure-JVM :capability-core module. The Android
#             app module (app/, the real BluetoothHidDevice transport) needs
#             the Android SDK + AGP and is intentionally NOT in
#             settings.gradle.kts yet; Slice 3 wires it in and adds an
#             assembleDebug job with an android-actions/setup-android step.
# Decide-and-flag : Gradle is provided by gradle/actions/setup-gradle rather
#             than a committed wrapper jar, so the repo carries no binary
#             blob. Reversible — a `gradle wrapper` + `./gradlew` can replace
#             this in Slice 3 if a pinned wrapper is preferred.
# Owner-gate: this is a NEW .github/workflows/** file, which merge-on-green.yml
#             parks as owner-merge-only (its workflow-touching rail). It ships
#             in its OWN small PR so the Slice-2 code could auto-land
#             separately; this file waits for the owner to merge.
# Date      : 2026-07-17 (phone-controller Slice 2)
# ========================================================================
name: android-ci
on:
  push:
    branches: [main]
    paths:
      - "products/phone-controller/android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "products/phone-controller/android/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  capability-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/phone-controller/android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: Build + unit-test the pure-JVM Kotlin verdict port
        run: gradle :capability-core:test --no-daemon --console=plain
